<html id = "html">
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body id ="body">
        <div id="sidebar">
            <label>Gravity<input type ="range" id="gravity" min="0" max="2" step=".1" value = ".5"></label>
            <label>Size<input type="range" id="size" min="2" max="20" step="1" value = "5"></label>
            <label>Color<input type="color" id="color" value="#000000"></label>
            <label>Spawn Rate<input type="range" id ="spawn" min="1" max="20" step="1" value="3"></label>
            <label>Wind<input type="range" id="wind" min="-2" max="1" step=".05" value="1"></label>
            <label>Opacity<input type = "range" id = "opacity" min= ".1" max = "1" step=".05" value="1"></label>
            <label>Lifetime<input type = "range" id = "life" min = "10" max = "300" step = "10" value = "200"></label>
            <label>Shape
                <select id="shape">
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                    <option value="triangle">Triangle</option>
                </select>
            </label>
            <button id="clear">Clear All</button>
         </div>
        <canvas id = "canvas"></canvas>
        <script src = "script.js"></script>
    </body>
</html>
